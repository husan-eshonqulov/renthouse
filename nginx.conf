server {
    listen 443;
    server_name msgpost.uz;
    
    location /webhook {
        proxy_pass http://bot:8080;
        proxy_set_header Host $host;
    }

    location /pgadmin {
        proxy_pass http://pgadmin;
    }

    location /redisinsight {
        proxy_pass http://redisinsight:5540;
    }
}